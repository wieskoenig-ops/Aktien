<title>▲ Bottleneck Vault</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #07090f;
    --bg2: #0d1120;
    --bg3: #111827;
    --border: #1a2235;
    --border2: #1e2d45;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --text4: #475569;
    --text5: #334155;
    --green: #22c55e;
    --amber: #f59e0b;
    --blue: #3b82f6;
    --purple: #a855f7;
    --purple-bg: #2e1065;
    --blue-btn: #1d4ed8;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; font-size: 15px; overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
  #header { background: #0b0f1a; border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: center; gap: 12px; height: calc(56px + var(--safe-top)); padding-top: var(--safe-top); flex-shrink: 0; position: relative; z-index: 50; }
  #main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; }
  #nav { background: #0b0f1a; border-top: 1px solid var(--border); display: flex; flex-shrink: 0; height: calc(60px + var(--safe-bottom)); padding-bottom: var(--safe-bottom); }

  /* HEADER */
  .logo { font-weight: 800; font-size: 16px; letter-spacing: 2px; color: var(--text); cursor: pointer; }
  .spacer { flex: 1; }
  .toast { font-size: 13px; color: var(--green); font-weight: 600; }
  .btn-new { background: var(--blue-btn); border: none; color: #fff; padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; }

  /* NAV */
  .nav-tab { flex: 1; background: none; border: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: var(--text5); transition: color 0.15s; padding: 8px 0; }
  .nav-tab.active { color: var(--text); }
  .nav-icon { font-size: 20px; line-height: 1; }
  .nav-label { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }

  /* CARDS */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .card-title { font-size: 11px; color: var(--text4); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 14px; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 8px; text-align: center; }
  .stat-val { font-size: 28px; font-weight: 800; line-height: 1; }
  .stat-lbl { font-size: 9px; color: var(--text4); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

  /* EARNINGS */
  .earnings-row { display: flex; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--bg3); cursor: pointer; gap: 10px; }
  .earnings-row:last-child { border-bottom: none; }
  .e-ticker { font-size: 13px; font-weight: 800; min-width: 72px; }
  .e-date { font-size: 12px; color: var(--amber); min-width: 86px; }
  .e-cat { font-size: 12px; color: var(--text4); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .e-arr { color: var(--text5); font-size: 16px; }

  /* REGION */
  .region-row { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
  .r-flag { font-size: 18px; width: 24px; }
  .r-name { font-size: 13px; color: var(--text2); width: 88px; }
  .r-bar { flex: 1; background: var(--bg3); border-radius: 4px; height: 5px; }
  .r-fill { background: var(--blue-btn); height: 5px; border-radius: 4px; }
  .r-count { font-size: 13px; color: var(--text4); width: 20px; text-align: right; }

  /* BOTTLENECK CHIPS */
  .bn-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .bn-chip { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 8px 14px; cursor: pointer; display: flex; align-items: center; gap: 7px; }
  .bn-flag { font-size: 16px; }
  .bn-ticker { font-size: 13px; font-weight: 700; color: var(--text2); }

  /* FILTER */
  .search-input { background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 10px; font-size: 15px; outline: none; width: 100%; margin-bottom: 10px; }
  .filter-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 8px; }
  .filter-chips::-webkit-scrollbar { display: none; }
  .chip { background: var(--bg2); border: 1px solid var(--border); color: var(--text3); padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); }

  .filter-count { font-size: 12px; color: var(--text5); margin-bottom: 12px; }
  .region-select { background: var(--bg2); border: 1px solid var(--border); color: var(--text3); padding: 7px 12px; border-radius: 8px; font-size: 13px; outline: none; cursor: pointer; }

  .pos-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
  .pos-ticker { font-size: 15px; font-weight: 800; }
  .bn-badge { font-size: 10px; color: var(--purple); font-weight: 700; background: var(--purple-bg); padding: 1px 6px; border-radius: 4px; }

  .pos-date { font-size: 12px; color: var(--amber); margin-top: 4px; }
  .pos-right { text-align: right; flex-shrink: 0; }
  .pos-kgv { font-size: 16px; font-weight: 700; color: var(--text); }
  .pos-kgv-lbl { font-size: 11px; color: var(--text5); }
  .pos-arr { color: var(--text5); font-size: 20px; margin-top: 4px; }

  .btn-save { background: var(--blue-btn); border: none; color: #fff; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 700; }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text3); padding: 10px 14px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  .metrics-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .metric-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 10px; text-align: center; }
  .metric-val { font-size: 18px; font-weight: 700; color: var(--text); }
  .metric-lbl { font-size: 10px; color: var(--text4); margin-top: 3px; text-transform: uppercase; letter-spacing: 1px; }
  .fields-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  .field-row { display: flex; align-items: center; padding: 13px 16px; border-bottom: 1px solid var(--bg3); }

  .field-val { font-size: 14px; color: var(--text2); flex: 1; }
  .field-inp { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 14px; outline: none; font-family: inherit; }

  .new-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .new-title { font-size: 18px; font-weight: 800; flex: 1; }
</style>

// State
let data = [], currentView = 'dash', filterStatus = 'alle', filterBN = 'alle', filterRegion = 'alle', searchQ = '', selected = null, editData = null, editMode = false;

function load() {
  try { const s = localStorage.getItem(STORAGE_KEY); data = s ? JSON.parse(s) : INITIAL; } catch { data = INITIAL; }
  if (!localStorage.getItem(STORAGE_KEY)) save();
  render();
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); showToast('✓'); } catch { showToast('⚠'); }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  setTimeout(() => t.textContent = '', 1800);
}

function nav(v) {
  currentView = v;
  ['dash','list','watch'].forEach(id => {
    const el = document.getElementById('tab-' + id);
    if (el) el.classList.toggle('active', id === v);
  });
  render();
}

function getFiltered() {
  const statusOrder = ['Bestand','Beobachten','Watchlist'];
  const convOrder = {hoch:0,'moderat-bullish':1,neutral:2,'neutral-spekulativ':3,'leicht-bullish':4};
  return [...data].filter(p => {
    if (filterStatus !== 'alle' && p.status !== filterStatus) return false;
    if (filterRegion !== 'alle' && p.region !== filterRegion) return false;
    if (filterBN === 'ja' && !p.bottleneck) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      if (!p.ticker.toLowerCase().includes(q) && !p.name.toLowerCase().includes(q) && !p.thema.toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a,b) => {
    const sd = statusOrder.indexOf(a.status) - statusOrder.indexOf(b.status);
    return sd !== 0 ? sd : (convOrder[a.conviction]??9) - (convOrder[b.conviction]??9);
  });
}

function h(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render() {
  const main = document.getElementById('main');
  if (currentView === 'dash') main.innerHTML = renderDash();
  else if (currentView === 'list') main.innerHTML = renderList(getFiltered());
  else if (currentView === 'watch') main.innerHTML = renderList(data.filter(p => p.status !== 'Bestand'), true);
  else if (currentView === 'detail') main.innerHTML = renderDetail();
  else if (currentView === 'new') main.innerHTML = renderNew();
  bindEvents();
}

function renderDash() {
  const bc = data.filter(p=>p.status==='Bestand').length;
  const oc = data.filter(p=>p.status==='Beobachten').length;
  const wc = data.filter(p=>p.status==='Watchlist').length;
  const bnc = data.filter(p=>p.bottleneck).length;
  const upcoming = [...data].filter(p=>p.nächstes_earnings).sort((a,b)=>a.nächstes_earnings.localeCompare(b.nächstes_earnings)).slice(0,6);
  const regionMap = {};
  data.filter(p=>p.status==='Bestand').forEach(p=>{regionMap[p.region]=(regionMap[p.region]||0)+1;});
  const regions = Object.entries(regionMap).sort((a,b)=>b[1]-a[1]);

  return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" style="color:#22c55e">${bc}</div><div class="stat-lbl">Bestand</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#f59e0b">${oc}</div><div class="stat-lbl">Beobachten</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#3b82f6">${wc}</div><div class="stat-lbl">Watchlist</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#a855f7">${bnc}</div><div class="stat-lbl">Bottleneck</div></div>
    </div>
    <div class="card">
      <div class="card-title">Nächste Earnings</div>
      ${upcoming.map(p=>`
        <div class="earnings-row" data-id="${h(p.id)}">
          <span class="e-ticker" style="color:${SC[p.status]||'#94a3b8'}">${h(p.ticker)}</span>
          <span class="e-date">${h(p.nächstes_earnings)}</span>
          <span class="e-cat">${h(p.catalyst)}</span>
          <span class="e-arr">›</span>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Bestand nach Region</div>
      ${regions.map(([r,c])=>`
        <div class="region-row">
          <span class="r-flag">${RF[r]||'🌍'}</span>
          <span class="r-name">${h(r)}</span>
          <div class="r-bar"><div class="r-fill" style="width:${Math.round(c/bc*100)}%"></div></div>
          <span class="r-count">${c}</span>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Bottleneck — Bestand</div>
      <div class="bn-grid">
        ${data.filter(p=>p.status==='Bestand'&&p.bottleneck).map(p=>`
          <div class="bn-chip" data-id="${h(p.id)}">
            <span class="bn-flag">${RF[p.region]||''}</span>
            <span class="bn-ticker">${h(p.ticker)}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderList(items, watchOnly=false) {
  const regions = [...new Set(data.map(p=>p.region))].sort();
  return `
    ${!watchOnly ? `
    <input class="search-input" id="search-inp" placeholder="Suche Ticker, Name, Thema…" value="${h(searchQ)}">
    <div class="filter-chips">
      ${['alle','Bestand','Beobachten','Watchlist'].map(s=>`
        <button class="chip ${filterStatus===s?'active-status':''}" data-status="${s}">${s==='alle'?'Alle':s}</button>`).join('')}
      <button class="chip ${filterBN==='ja'?'active-bn':''}" id="bn-toggle">▲ Bottleneck</button>
      <select class="region-select" id="region-sel">
        <option value="alle">Alle Regionen</option>
        ${regions.map(r=>`<option value="${h(r)}" ${filterRegion===r?'selected':''}>${RF[r]||''} ${h(r)}</option>`).join('')}
      </select>
    </div>
    <div class="filter-count">${items.length} Positionen</div>` : `<div class="filter-count" style="margin-bottom:12px">${items.length} Positionen</div>`}
    ${items.map(p=>`
      <div class="pos-card" data-id="${h(p.id)}">
        <div class="pos-left">
          <div class="pos-top">
            <span class="pos-ticker" style="color:${SC[p.status]||'#94a3b8'}">${h(p.ticker)}</span>
            ${p.bottleneck?`<span class="bn-badge">▲ BN</span>`:''}
            <span class="status-badge" style="background:${(SC[p.status]||'#64748b')}18;color:${SC[p.status]||'#64748b'}">${h(p.status)}</span>
          </div>
          <div class="pos-name">${h(p.name)}</div>
          <div class="pos-meta">${RF[p.region]||''} ${h(p.region)} · ${h(p.thema)}</div>
          ${p.nächstes_earnings?`<div class="pos-date">📅 ${h(p.nächstes_earnings)}</div>`:''}
        </div>
        <div class="pos-right">
          ${p.kgv_forward?`<div class="pos-kgv">${p.kgv_forward}×</div><div class="pos-kgv-lbl">KGV fwd</div>`:''}
          <div class="pos-arr">›</div>
        </div>
      </div>`).join('')}`;
}

function renderDetail() {
  const p = editMode ? editData : selected;
  if (!p) return '';
  const fieldVal = (lbl, key, val) => `
    <div class="field-row">
      <span class="field-lbl">${lbl}</span>
      ${editMode
        ? `<input class="field-inp" data-key="${key}" value="${h(editData[key]??'')}">`
        : `<span class="field-val">${h(val??'—')}</span>`}
    </div>`;
  const fieldSel = (lbl, key, opts) => `
    <div class="field-row">
      <span class="field-lbl">${lbl}</span>
      ${editMode
        ? `<select class="field-sel" data-key="${key}">${opts.map(o=>`<option ${editData[key]===o?'selected':''}>${h(o)}</option>`).join('')}</select>`
        : `<span class="field-val">${h(selected[key]??'—')}</span>`}
    </div>`;
  return `
    <div class="detail-header">
      <button class="btn-back" id="btn-back">←</button>
      <div class="detail-title-wrap">
        <div class="detail-ticker-row">
          <span class="detail-ticker" style="color:${SC[selected.status]||'#94a3b8'}">${h(selected.ticker)}</span>
          ${selected.bottleneck?`<span class="bn-badge" style="font-size:11px;padding:2px 8px">▲ BOTTLENECK</span>`:''}
          <span class="status-badge" style="background:${(SC[selected.status]||'#64748b')}22;color:${SC[selected.status]||'#64748b'}">${h(selected.status)}</span>
        </div>
        <div class="detail-name">${h(selected.name)}</div>
      </div>
      ${!editMode
        ? `<button class="btn-edit" id="btn-edit-mode">Bearbeiten</button>`
        : `<div style="display:flex;gap:8px"><button class="btn-save" id="btn-save-edit">Speichern</button><button class="btn-cancel" id="btn-cancel-edit">✕</button></div>`}
    </div>
    <div class="metrics-row">
      <div class="metric-card"><div class="metric-val">${selected.kgv_forward?selected.kgv_forward+'×':'—'}</div><div class="metric-lbl">KGV Forward</div></div>
      <div class="metric-card"><div class="metric-val">${selected.kgv_median_5j?selected.kgv_median_5j+'×':'—'}</div><div class="metric-lbl">KGV Median 5J</div></div>
      <div class="metric-card"><div class="metric-val">${selected.dividende?selected.dividende+'%':'—'}</div><div class="metric-lbl">Dividende</div></div>
    </div>
    <div class="fields-card">
      ${fieldVal('Thema','thema',selected.thema)}
      ${fieldVal('Sektor','sektor',selected.sektor)}
      ${fieldSel('Region','region',['Deutschland','Europa','USA','Japan','Taiwan','China','Norwegen','Dänemark'])}
      ${fieldSel('Conviction','conviction',['hoch','moderat-bullish','neutral','leicht-bullish','neutral-spekulativ'])}
      ${fieldSel('Status','status',['Bestand','Beobachten','Watchlist','Verkauft'])}
      ${fieldVal('Bottleneck-Typ','bottleneck_typ',selected.bottleneck_typ)}
      ${fieldVal('Bewertung','bewertung',selected.bewertung)}
      ${fieldVal('Einstieg Ziel','einstieg_ziel',selected.einstieg_ziel)}
      ${fieldVal('Kurs','kurs',selected.kurs)}
      ${fieldVal('KGV Forward','kgv_forward',selected.kgv_forward)}
      ${fieldVal('KGV Median 5J','kgv_median_5j',selected.kgv_median_5j)}
      ${fieldVal('Dividende %','dividende',selected.dividende)}
      ${editMode
        ? `<div class="field-row"><span class="field-lbl">Earnings</span><input class="field-inp" type="date" data-key="nächstes_earnings" value="${h(editData.nächstes_earnings||'')}"></div>`
        : `<div class="field-row"><span class="field-lbl">Earnings</span><span class="field-val">${h(selected.nächstes_earnings||'—')}</span></div>`}
      ${fieldVal('Catalyst','catalyst',selected.catalyst)}
    </div>
    ${editMode ? `
    <div class="card" style="margin-bottom:16px">
      <span class="field-lbl" style="display:block;margin-bottom:8px">Bottleneck</span>
      <button class="bn-toggle ${editData.bottleneck?'on':'off'}" id="bn-toggle-edit">${editData.bottleneck?'▲ Ja':'Nein'}</button>
    </div>` : ''}
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Tags</div>
      ${editMode
        ? `<input class="field-inp" id="tags-inp" value="${h((editData.tags||[]).join(','))}" placeholder="tag1,tag2,tag3" style="width:100%">`
        : `<div class="tags-wrap">${(selected.tags||[]).map(t=>`<span class="tag">${h(t)}</span>`).join('')}</div>`}
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">Notizen & Thesis</div>
      ${editMode
        ? `<textarea class="notes-ta" id="notes-ta" rows="6">${h(editData.notizen||'')}</textarea>`
        : `<div class="notes-text">${h(selected.notizen)||'<span style="color:#334155">Keine Notizen</span>'}</div>`}
    </div>
    <div class="update-lbl">Zuletzt aktualisiert: ${h(selected.letzte_aktualisierung||'—')}</div>
    <button class="btn-delete" data-del="${h(selected.id)}">Position löschen</button>`;
}

function renderNew() {
  const sel = (lbl,key,opts,def) => `
    <div class="field-row">
      <span class="field-lbl">${lbl}</span>
      <select class="field-sel" id="new-${key}">
        ${opts.map(o=>`<option ${o===def?'selected':''}>${h(o)}</option>`).join('')}
      </select>
    </div>`;
  const inp = (lbl,key,type='text') => `
    <div class="field-row">
      <span class="field-lbl">${lbl}</span>
      <input class="field-inp" id="new-${key}" type="${type}">
    </div>`;
  return `
    <div class="new-header">
      <button class="btn-back" id="btn-back">←</button>
      <span class="new-title">Neue Position</span>
      <button class="btn-save" id="btn-save-new">Speichern</button>
    </div>
    <div class="fields-card" style="margin-bottom:16px">
      ${inp('Ticker *','ticker')}${inp('Name *','name')}${inp('Sektor','sektor')}${inp('Thema','thema')}
      ${sel('Region','region',['Deutschland','Europa','USA','Japan','Taiwan','China','Norwegen','Dänemark'],'Deutschland')}
      ${sel('Währung','währung',['EUR','USD','JPY','DKK','NOK','TWD','HKD'],'EUR')}
      ${sel('Status','status',['Bestand','Beobachten','Watchlist'],'Beobachten')}
      ${sel('Conviction','conviction',['hoch','moderat-bullish','neutral','leicht-bullish','neutral-spekulativ'],'moderat-bullish')}
      ${inp('Bewertung','bewertung')}${inp('Einstieg Ziel','einstieg_ziel')}
      ${inp('Kurs','kurs','number')}${inp('KGV Forward','kgv_forward','number')}
      ${inp('KGV Median 5J','kgv_median_5j','number')}${inp('Dividende %','dividende','number')}
      ${inp('Nächstes Earnings','nächstes_earnings','date')}${inp('Catalyst','catalyst')}
      <div class="field-row"><span class="field-lbl">Tags</span><input class="field-inp" id="new-tags" placeholder="tag1,tag2"></div>
      <div class="field-row"><span class="field-lbl">Bottleneck</span><button class="bn-toggle off" id="new-bn-toggle">Nein</button></div>
      <div class="field-row"><span class="field-lbl">BN-Typ</span><input class="field-inp" id="new-bottleneck_typ"></div>
    </div>
    <div class="card">
      <div class="card-title">Notizen & Thesis</div>
      <textarea class="notes-ta" id="new-notizen" rows="5" placeholder="Investment-Thesis, Risiken, Beobachtungen…"></textarea>
    </div>`;
}

function bindEvents() {
  // Earnings / BN chips
  document.querySelectorAll('.earnings-row[data-id], .bn-chip[data-id], .pos-card[data-id]').forEach(el => {
    el.addEventListener('click', () => {
      const p = data.find(x => x.id === el.dataset.id);
      if (p) { selected = p; editData = {...p}; editMode = false; currentView = 'detail'; render(); }
    });
  });

  // Filter chips
  document.querySelectorAll('[data-status]').forEach(el => {
    el.addEventListener('click', () => { filterStatus = el.dataset.status; render(); });
  });
  const bnToggle = document.getElementById('bn-toggle');
  if (bnToggle) bnToggle.addEventListener('click', () => { filterBN = filterBN==='ja'?'alle':'ja'; render(); });
  const regSel = document.getElementById('region-sel');
  if (regSel) regSel.addEventListener('change', () => { filterRegion = regSel.value; render(); });
  const searchInp = document.getElementById('search-inp');
  if (searchInp) { searchInp.addEventListener('input', () => { searchQ = searchInp.value; render(); }); searchInp.focus(); }

  // Back button
  const back = document.getElementById('btn-back');
  if (back) back.addEventListener('click', () => { nav('list'); });

  // Edit mode
  const btnEdit = document.getElementById('btn-edit-mode');
  if (btnEdit) btnEdit.addEventListener('click', () => { editMode = true; render(); });
  const btnCancel = document.getElementById('btn-cancel-edit');
  if (btnCancel) btnCancel.addEventListener('click', () => { editMode = false; render(); });

  // Save edit
  const btnSave = document.getElementById('btn-save-edit');
  if (btnSave) btnSave.addEventListener('click', () => {
    document.querySelectorAll('.field-inp[data-key], .field-sel[data-key]').forEach(el => {
      const k = el.dataset.key;
      const numKeys = ['kurs','kgv_forward','kgv_median_5j','dividende'];
      editData[k] = numKeys.includes(k) ? (parseFloat(el.value)||null) : el.value;
    });
    const tagsInp = document.getElementById('tags-inp');
    if (tagsInp) editData.tags = tagsInp.value.split(',').map(t=>t.trim()).filter(Boolean);
    const notesTA = document.getElementById('notes-ta');
    if (notesTA) editData.notizen = notesTA.value;
    editData.letzte_aktualisierung = new Date().toISOString().slice(0,10);
    data = data.map(p => p.id === editData.id ? editData : p);
    selected = editData;
    editMode = false;
    save();
    render();
  });

  // BN toggle in edit
  const bnEdit = document.getElementById('bn-toggle-edit');
  if (bnEdit) bnEdit.addEventListener('click', () => {
    editData.bottleneck = !editData.bottleneck;
    bnEdit.textContent = editData.bottleneck ? '▲ Ja' : 'Nein';
    bnEdit.className = 'bn-toggle ' + (editData.bottleneck?'on':'off');
  });

  // Delete
  document.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', () => {
      if (confirm('Position löschen?')) {
        data = data.filter(p => p.id !== el.dataset.del);
        save(); nav('list');
      }
    });
  });

  // New BN toggle
  let newBN = false;
  const newBNBtn = document.getElementById('new-bn-toggle');
  if (newBNBtn) newBNBtn.addEventListener('click', () => {
    newBN = !newBN;
    newBNBtn.textContent = newBN ? '▲ Ja' : 'Nein';
    newBNBtn.className = 'bn-toggle ' + (newBN?'on':'off');
    newBNBtn._val = newBN;
  });

  // Save new
  const btnSaveNew = document.getElementById('btn-save-new');
  if (btnSaveNew) btnSaveNew.addEventListener('click', () => {
    const g = id => (document.getElementById(id)||{}).value || '';
    const bn = document.getElementById('new-bn-toggle');
    const newPos = {
      id: g('new-ticker') || Date.now().toString(),
      ticker: g('new-ticker'), name: g('new-name'), sektor: g('new-sektor'), thema: g('new-thema'),
      region: g('new-region'), währung: g('new-währung'), status: g('new-status'), conviction: g('new-conviction'),
      bottleneck: bn ? bn._val||false : false,
      bottleneck_typ: g('new-bottleneck_typ'), bewertung: g('new-bewertung'), einstieg_ziel: g('new-einstieg_ziel'),
      kurs: parseFloat(g('new-kurs'))||null, kgv_forward: parseFloat(g('new-kgv_forward'))||null,
      kgv_median_5j: parseFloat(g('new-kgv_median_5j'))||null, dividende: parseFloat(g('new-dividende'))||null,
      nächstes_earnings: g('new-nächstes_earnings'), catalyst: g('new-catalyst'),
      tags: g('new-tags').split(',').map(t=>t.trim()).filter(Boolean),
      notizen: g('new-notizen'), letzte_aktualisierung: new Date().toISOString().slice(0,10)
    };
    data.push(newPos); save(); nav('list');
  });
}

load();
</script>
</body>
</html>
