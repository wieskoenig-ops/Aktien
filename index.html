let data=[], currentView='dash', filterStatus='alle', filterBN='alle', filterRegion='alle', searchQ='', selected=null, editData=null, editMode=false;

function load(){
  try{ const s=localStorage.getItem(STORAGE_KEY); data=s?JSON.parse(s):INITIAL; }catch{ data=INITIAL; }
  if(!localStorage.getItem(STORAGE_KEY)) save(false);
  render();
}
function save(toast=true){
  try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(data)); if(toast) showToast('✓'); }catch{ if(toast) showToast('⚠'); }
}
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; setTimeout(()=>t.textContent='',1800); }
function nav(v){ currentView=v; ['dash','list','watch'].forEach(id=>{ const el=document.getElementById('tab-'+id); if(el) el.classList.toggle('active',id===v); }); render(); }
function getFiltered(){
  const so=['Bestand','Beobachten','Watchlist'], co={hoch:0,'moderat-bullish':1,neutral:2,'neutral-spekulativ':3,'leicht-bullish':4};
  return [...data].filter(p=>{
    if(filterStatus!=='alle'&&p.status!==filterStatus) return false;
    if(filterRegion!=='alle'&&p.region!==filterRegion) return false;
    if(filterBN==='ja'&&!p.bottleneck) return false;
    if(searchQ){ const q=searchQ.toLowerCase(); if(!p.ticker.toLowerCase().includes(q)&&!p.name.toLowerCase().includes(q)&&!p.thema.toLowerCase().includes(q)&&!(p.scalable_thema||'').toLowerCase().includes(q)) return false; }
    return true;
  }).sort((a,b)=>{ const sd=so.indexOf(a.status)-so.indexOf(b.status); return sd!==0?sd:(co[a.conviction]??9)-(co[b.conviction]??9); });
}
function h(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtPerf(pct,eur){
  if(pct===null||pct===undefined) return '';
  const cls=pct>=0?'perf-pos':'perf-neg';
  const sign=pct>=0?'+':'';
  return `<span class="${cls}">${sign}${pct.toFixed(1)}% / ${eur>=0?'+':''}${eur}€</span>`;
}

function render(){
  const main=document.getElementById('main');
  if(currentView==='dash') main.innerHTML=renderDash();
  else if(currentView==='list') main.innerHTML=renderList(getFiltered());
  else if(currentView==='watch') main.innerHTML=renderList(data.filter(p=>p.status!=='Bestand'),true);
  else if(currentView==='detail') main.innerHTML=renderDetail();
  else if(currentView==='new') main.innerHTML=renderNew();
  bindEvents();
}

function renderDash(){
  const bc=data.filter(p=>p.status==='Bestand').length;
  const oc=data.filter(p=>p.status==='Beobachten').length;
  const wc=data.filter(p=>p.status==='Watchlist').length;
  const bnc=data.filter(p=>p.bottleneck).length;
  const upcoming=[...data].filter(p=>p.nächstes_earnings).sort((a,b)=>a.nächstes_earnings.localeCompare(b.nächstes_earnings)).slice(0,6);
  const regionMap={};
  data.filter(p=>p.status==='Bestand').forEach(p=>{regionMap[p.region]=(regionMap[p.region]||0)+1;});
  const regions=Object.entries(regionMap).sort((a,b)=>b[1]-a[1]);
  const totalVal=data.filter(p=>p.positionswert).reduce((s,p)=>s+p.positionswert,0);
  return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val" style="color:#22c55e">${bc}</div><div class="stat-lbl">Bestand</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#f59e0b">${oc}</div><div class="stat-lbl">Beobachten</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#3b82f6">${wc}</div><div class="stat-lbl">Watchlist</div></div>
      <div class="stat-card"><div class="stat-val" style="color:#a855f7">${bnc}</div><div class="stat-lbl">Bottleneck</div></div>
    </div>
    <div class="card">
      <div class="card-title">Nächste Earnings</div>
      ${upcoming.map(p=>`<div class="earnings-row" data-id="${h(p.id)}"><span class="e-ticker" style="color:${SC[p.status]||'#94a3b8'}">${h(p.ticker)}</span><span class="e-date">${h(p.nächstes_earnings)}</span><span class="e-cat">${h(p.catalyst)}</span><span class="e-arr">›</span></div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Bestand nach Region</div>
      ${regions.map(([r,c])=>`<div class="region-row"><span class="r-flag">${RF[r]||'🌍'}</span><span class="r-name">${h(r)}</span><div class="r-bar"><div class="r-fill" style="width:${Math.round(c/bc*100)}%"></div></div><span class="r-count">${c}</span></div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title">Bottleneck — Bestand</div>
      <div class="bn-grid">${data.filter(p=>p.status==='Bestand'&&p.bottleneck).map(p=>`<div class="bn-chip" data-id="${h(p.id)}"><span class="bn-flag">${RF[p.region]||''}</span><span class="bn-ticker">${h(p.ticker)}</span></div>`).join('')}</div>
    </div>`;
}

  const regions=[...new Set(data.map(p=>p.region))].sort();

      <button class="chip ${filterBN==='ja'?'active-bn':''}" id="bn-toggle">▲ BN</button>
      <select class="region-select" id="region-sel"><option value="alle">Alle Regionen</option>${regions.map(r=>`<option value="${h(r)}" ${filterRegion===r?'selected':''}>${RF[r]||''} ${h(r)}</option>`).join('')}</select>
    </div>
    <div class="filter-count">${items.length} Positionen</div>`:`<div class="filter-count" style="margin-bottom:12px">${items.length} Positionen</div>`}
    ${items.map(p=>`
      <div class="pos-card" data-id="${h(p.id)}" style="flex-direction:column;align-items:stretch;gap:0">
        <div style="display:flex;align-items:center;gap:14px">
          <div class="pos-left">
            <div class="pos-top">
              <span class="pos-ticker" style="color:${SC[p.status]||'#94a3b8'}">${h(p.ticker)}</span>
              ${p.bottleneck?`<span class="bn-badge">▲ BN</span>`:''}
              <span class="status-badge" style="background:${(SC[p.status]||'#64748b')}18;color:${SC[p.status]||'#64748b'}">${h(p.status)}</span>
              ${p.scalable_thema?`<span class="scalable-bucket">${h(p.scalable_thema)}</span>`:''}
            </div>
            <div class="pos-name">${h(p.name)}</div>
            <div class="pos-meta">${RF[p.region]||''} ${h(p.region)} · ${h(p.thema)}</div>
            ${p.nächstes_earnings?`<div class="pos-date">📅 ${h(p.nächstes_earnings)}</div>`:''}
          </div>
          <div class="pos-right">
            ${p.positionswert?`<div class="pos-val">${p.positionswert.toLocaleString('de')}€</div>`:''}
            ${p.stück?`<div style="font-size:11px;color:var(--text4)">${p.stück} Stk</div>`:''}
            ${p.perf_pct!==null&&p.perf_pct!==undefined?`<div class="pos-perf ${p.perf_pct>=0?'perf-pos':'perf-neg'}">${p.perf_pct>=0?'+':''}${p.perf_pct.toFixed(1)}%</div>`:'<div class="pos-arr" style="font-size:16px;color:var(--text5)">›</div>'}
          </div>
        </div>
        ${p.notizen
          ? `<div class="pos-notes-preview">${h(p.notizen)}</div>`
          : `<div class="pos-notes-empty">Keine Notizen — tippen zum Hinzufügen</div>`}
      </div>`).join('')}`;
}

function renderMarkdown(text) {
  if (!text) return '';
  return h(text)
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>');
}

function bindEvents(){
  document.querySelectorAll('.earnings-row[data-id],.bn-chip[data-id],.pos-card[data-id]').forEach(el=>{
    el.addEventListener('click',()=>{ const p=data.find(x=>x.id===el.dataset.id); if(p){selected=p;editData={...p};editMode=false;currentView='detail';render();} });
  });
  document.querySelectorAll('[data-status]').forEach(el=>el.addEventListener('click',()=>{filterStatus=el.dataset.status;render();}));
  const bnT=document.getElementById('bn-toggle'); if(bnT) bnT.addEventListener('click',()=>{filterBN=filterBN==='ja'?'alle':'ja';render();});
  const rS=document.getElementById('region-sel'); if(rS) rS.addEventListener('change',()=>{filterRegion=rS.value;render();});
  const sI=document.getElementById('search-inp'); if(sI){sI.addEventListener('input',()=>{searchQ=sI.value;render();});sI.focus();}
  const back=document.getElementById('btn-back'); if(back) back.addEventListener('click',()=>nav('list'));
  
  // Notes inline edit
  const btnNotesEdit=document.getElementById('btn-notes-edit');
  if(btnNotesEdit) btnNotesEdit.addEventListener('click',()=>{editMode=true;render();setTimeout(()=>{const ta=document.getElementById('notes-ta');if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}},50);});
  
  const btnNotesSave=document.getElementById('btn-notes-save');
  if(btnNotesSave) btnNotesSave.addEventListener('click',()=>{
    const ta=document.getElementById('notes-ta');
    if(ta) editData.notizen=ta.value;
    editData.letzte_aktualisierung=new Date().toISOString().slice(0,10);
    data=data.map(p=>p.id===editData.id?editData:p);
    selected=editData; editMode=false; save(); render();
  });

  // Details toggle
  let detailsOpen=false;
  const detToggle=document.getElementById('details-toggle');
  const detSection=document.getElementById('details-section');
  const detArrow=document.getElementById('details-arrow');
  if(detToggle&&detSection){
    detSection.style.display='none';
    detToggle.addEventListener('click',()=>{
      detailsOpen=!detailsOpen;
      detSection.style.display=detailsOpen?'block':'none';
      if(detArrow) detArrow.textContent=detailsOpen?'▲':'▼';
    });
  }
  const bE=document.getElementById('btn-edit-mode'); if(bE) bE.addEventListener('click',()=>{editMode=true;render();});
  const bC=document.getElementById('btn-cancel-edit'); if(bC) bC.addEventListener('click',()=>{editMode=false;render();});
  const bS=document.getElementById('btn-save-edit');
  if(bS) bS.addEventListener('click',()=>{
    document.querySelectorAll('.field-inp[data-key],.field-sel[data-key]').forEach(el=>{
      const k=el.dataset.key;
      const nums=['kurs','kgv_forward','kgv_median_5j','dividende','stück','positionswert','einstiegskurs','perf_pct','perf_eur'];
      editData[k]=nums.includes(k)?(parseFloat(el.value)||null):el.value;
    });
    const ti=document.getElementById('tags-inp'); if(ti) editData.tags=ti.value.split(',').map(t=>t.trim()).filter(Boolean);
    const nt=document.getElementById('notes-ta'); if(nt) editData.notizen=nt.value;
    editData.letzte_aktualisierung=new Date().toISOString().slice(0,10);
    data=data.map(p=>p.id===editData.id?editData:p);
    selected=editData; editMode=false; save(); render();
  });
  const bnE=document.getElementById('bn-toggle-edit');
  if(bnE) bnE.addEventListener('click',()=>{editData.bottleneck=!editData.bottleneck;bnE.textContent=editData.bottleneck?'▲ Ja':'Nein';bnE.className='bn-toggle '+(editData.bottleneck?'on':'off');});
  document.querySelectorAll('[data-del]').forEach(el=>el.addEventListener('click',()=>{if(confirm('Position löschen?')){data=data.filter(p=>p.id!==el.dataset.del);save();nav('list');}}));
  // New form: details toggle
  const newDetToggle=document.getElementById('new-details-toggle');
  const newDetSection=document.getElementById('new-details-section');
  const newDetArrow=document.getElementById('new-details-arrow');
  if(newDetToggle&&newDetSection){
    newDetToggle.addEventListener('click',()=>{
      const open=newDetSection.style.display!=='none';
      newDetSection.style.display=open?'none':'block';
      if(newDetArrow) newDetArrow.textContent=open?'▼':'▲';
    });
  }

  // New form: status chips
  let newStatus='Beobachten';
  document.querySelectorAll('[data-new-status]').forEach(el=>{
    if(el.dataset.newStatus===newStatus) el.classList.add('active-status');
    el.addEventListener('click',()=>{
      newStatus=el.dataset.newStatus;
      document.querySelectorAll('[data-new-status]').forEach(e=>e.classList.remove('active-status'));
      el.classList.add('active-status');
    });
  });

  // Auto-focus notizen on new form
  const newNotizen=document.getElementById('new-notizen');
  // Don't auto-focus - ticker first

  let newBN=false;
  const nBN=document.getElementById('new-bn-toggle');
  if(nBN) nBN.addEventListener('click',()=>{newBN=!newBN;nBN.textContent=newBN?'▲ Ja':'Nein';nBN.className='bn-toggle '+(newBN?'on':'off');nBN._val=newBN;});
  const bSN=document.getElementById('btn-save-new');
  if(bSN) bSN.addEventListener('click',()=>{
    const g=id=>(document.getElementById(id)||{}).value||'';
    const bn=document.getElementById('new-bn-toggle');
    const np={
      id:g('new-ticker')||Date.now().toString(),ticker:g('new-ticker'),name:g('new-name'),sektor:g('new-sektor'),thema:g('new-thema'),
      region:g('new-region'),währung:g('new-währung'),status:g('new-status'),conviction:g('new-conviction'),
      scalable_thema:g('new-scalable_thema'),bottleneck:bn?bn._val||false:false,bottleneck_typ:g('new-bottleneck_typ'),
      bewertung:g('new-bewertung'),einstieg_ziel:g('new-einstieg_ziel'),
      stück:parseFloat(g('new-stück'))||null,positionswert:parseFloat(g('new-positionswert'))||null,
      einstiegskurs:parseFloat(g('new-einstiegskurs'))||null,perf_pct:null,perf_eur:null,
      kgv_forward:parseFloat(g('new-kgv_forward'))||null,dividende:parseFloat(g('new-dividende'))||null,
      nächstes_earnings:g('new-nächstes_earnings'),catalyst:g('new-catalyst'),
      tags:g('new-tags').split(',').map(t=>t.trim()).filter(Boolean),notizen:g('new-notizen'),
      letzte_aktualisierung:new Date().toISOString().slice(0,10)
    };
    data.push(np);save();nav('list');
  });
}
load();
</script>
